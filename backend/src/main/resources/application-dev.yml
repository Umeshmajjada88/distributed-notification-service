spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: root123

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.umesh.distributed_notification_service: DEBUG

springdoc:

  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

management:

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always