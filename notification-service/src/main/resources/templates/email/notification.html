<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Notification</title>
</head>

<body style="font-family: Arial, sans-serif; background:#f4f4f4; padding:30px;">

    <div style="max-width:600px;background:white;border-radius:8px;padding:30px;margin:auto;">

        <h2 style="color:#2563eb;">
            Distributed Notification Service
        </h2>

        <p>Hello,</p>

        <p>Your notification has been processed successfully.</p>

        <hr>

        <p>
            <strong>Subject:</strong>
            <span th:text="${subject}"></span>
        </p>

        <p>
            <strong>Message:</strong>
            <span th:text="${message}"></span>
        </p>

        <hr>

        <p style="color:gray;">
            This email was sent automatically by the
            Distributed Notification Service.
        </p>

    </div>

</body>

</html>
